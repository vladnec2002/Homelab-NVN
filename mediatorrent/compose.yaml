networks:
  servarrnetwork:
    name: servarrnetwork
    ipam:
      config:
        - subnet: 172.39.0.0/24

services:

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
      - UMASK=002
    volumes:
      - ./qbittorrent:/config
      - /data:/data
    ports:
      - 8080:8080
      - 6881:6881
    networks:
      servarrnetwork:
        ipv4_address: 172.39.0.10

  #nzbget:
   # image: lscr.io/linuxserver/nzbget:latest
