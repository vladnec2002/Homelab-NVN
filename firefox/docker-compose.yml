services:
  firefox:
    image: lscr.io/linuxserver/firefox:latest
    container_name: firefox

    security_opt:
      - seccomp:unconfined

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bucharest

    volumes:
      - ./firefox-config:/config

    ports:
      - "3232:3000"   # Web UI
      - "3231:3001"   # Optional HTTPS

    shm_size: "2gb"

    restart: unless-stopped
