services:
  glances:
    image: nicolargo/glances:latest
    container_name: glances
    restart: unless-stopped
    ports:
      - 61208:61208
    environment:
      - GLANCES_OPT=-w
    pid: host
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
      - /data:/data:ro
      - /datalvm:/datalvm:ro
      - /mnt/storage:/mnt/storage:ro
      - /docker/glances/glances.conf:/root/.config/glances/glances.conf:ro
