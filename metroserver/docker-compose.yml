services:
  metroserver:
    image: ghcr.io/metrolistgroup/metroserver:latest
    container_name: metroserver
    ports:
      - "4444:8080"
    environment:
      PORT: 8080
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4444/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
