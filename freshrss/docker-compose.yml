services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss
    restart: unless-stopped
    ports:
      - "8885:80"
    volumes:
      - freshrss-data:/var/www/FreshRSS/data
      - freshrss-extensions:/var/www/FreshRSS/extensions
    environment:
      - TZ=Europe/Bucharest
    networks:
      - freshrss-net

volumes:
  freshrss-data:
  freshrss-extensions:

networks:
  freshrss-net:
    driver: bridge
