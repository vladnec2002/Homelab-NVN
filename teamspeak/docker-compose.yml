services:
  teamspeak6:
    image: teamspeaksystems/teamspeak6-server:latest
    container_name: teamspeak6
    restart: unless-stopped
    environment:
      - TSSERVER_LICENSE_ACCEPTED=accept
    ports:
      - "9987:9987/udp"
      - "30033:30033/tcp"
      - "10011:10011/tcp"
    volumes:
      - teamspeak6-data:/var/tsserver

volumes:
  teamspeak6-data:
    name: teamspeak_teamspeak6-data
